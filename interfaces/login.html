<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Iniciar sesión — referencia HTML</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/main.css">
</head>
<body>
  <nav class="navbar navbar-expand-lg bg-white shadow-sm mb-3">
    <div class="container">
      <a class="navbar-brand" href="index.html">Inicio</a>
    </div>
  </nav>
  <div class="container login-card">
    <div class="card shadow">
      <div class="card-body p-4">
        <h1 class="h4 text-center mb-4" style="color:#0d47a1;">Sistema Académico</h1>
        <p class="small text-muted text-center">(Vista estática — el formulario real está en <code>login.php</code>)</p>
        <form action="#" method="get" autocomplete="off">
          <div class="mb-3">
            <label class="form-label">Rol</label>
            <select name="rol" class="form-select" required>
              <option value="">Seleccione...</option>
              <option value="administrador">Administrador</option>
              <option value="docente">Docente</option>
              <option value="estudiante">Estudiante</option>
            </select>
          </div>
          <div class="mb-3">
            <label class="form-label">Usuario</label>
            <input type="text" name="usuario" class="form-control" placeholder="Correo (admin) o documento" required>
            <div class="form-text">Administrador: correo institucional. Docente y estudiante: número de documento.</div>
          </div>
          <div class="mb-3">
            <label class="form-label">Contraseña</label>
            <input type="password" name="clave" class="form-control" required>
          </div>
          <button type="button" class="btn btn-primary w-100" disabled>Entrar (usa login.php)</button>
        </form>
        <p class="small text-muted mt-3 mb-0">Demo admin: <code>admin@academico.edu</code> / <code>admin123</code></p>
      </div>
    </div>
  </div>
  <footer class="site-footer">
    <div class="container">Desarrollado por Melanny Guate © 2026 — Sistema Académico</div>
  </footer>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
