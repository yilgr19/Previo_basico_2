<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Iniciar sesión — referencia HTML</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { theme: { extend: { colors: { academic: { DEFAULT: '#0d47a1', dark: '#0a3a82' } } } } };</script>
  <link rel="stylesheet" href="../assets/css/main.css">
</head>
<body class="flex min-h-screen flex-col bg-gray-50">
  <nav class="border-b border-gray-200 bg-white shadow-sm">
    <div class="mx-auto flex max-w-7xl px-4 py-3">
      <a class="text-lg font-bold text-academic" href="index.html">Inicio</a>
    </div>
  </nav>
  <main class="flex flex-1 flex-col justify-center px-4 py-10">
    <div class="mx-auto w-full max-w-md">
      <div class="overflow-hidden rounded-2xl border border-gray-200 bg-white shadow-lg">
        <div class="p-6 sm:p-8">
          <h1 class="mb-2 text-center text-xl font-bold text-academic">Sistema Académico</h1>
          <p class="mb-6 text-center text-xs text-gray-500">(Vista estática — el formulario real está en <code class="rounded bg-gray-100 px-1">login.php</code>)</p>
          <form action="#" method="get" autocomplete="off" class="space-y-4">
            <div>
              <label class="mb-1 block text-sm font-medium text-gray-700">Rol</label>
              <select name="rol" class="mt-1 block w-full rounded-lg border border-gray-300 px-3 py-2.5 text-sm shadow-sm focus:border-blue-500 focus:outline-none focus:ring-2 focus:ring-blue-500/30" required>
                <option value="">Seleccione...</option>
                <option value="administrador">Administrador</option>
                <option value="docente">Docente</option>
                <option value="estudiante">Estudiante</option>
              </select>
            </div>
            <div>
              <label class="mb-1 block text-sm font-medium text-gray-700">Usuario</label>
              <input type="text" name="usuario" class="mt-1 block w-full rounded-lg border border-gray-300 px-3 py-2.5 text-sm shadow-sm" placeholder="Correo (admin) o documento" required>
              <p class="mt-1 text-xs text-gray-500">Administrador: correo institucional. Docente y estudiante: documento.</p>
            </div>
            <div>
              <label class="mb-1 block text-sm font-medium text-gray-700">Contraseña</label>
              <input type="password" name="clave" class="mt-1 block w-full rounded-lg border border-gray-300 px-3 py-2.5 text-sm shadow-sm" required>
            </div>
            <button type="button" class="w-full cursor-not-allowed rounded-lg bg-gray-400 py-2.5 text-sm font-semibold text-white" disabled>Entrar (usa login.php)</button>
          </form>
          <p class="mt-4 text-xs text-gray-500">Demo admin: <code class="rounded bg-gray-100 px-1">admin@academico.edu</code> / <code class="rounded bg-gray-100 px-1">admin123</code></p>
        </div>
      </div>
    </div>
  </main>
  <footer class="border-t border-gray-200 bg-white py-4 text-center text-sm text-gray-500">Desarrollado por Melanny Guate © 2026 — Sistema Académico</footer>
</body>
</html>
